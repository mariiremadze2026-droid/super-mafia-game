<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mafia Game</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:15px;
}

.container{
width:100%;
max-width:500px;
background:#1e1e1e;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

h1,h2,p{
text-align:center;
margin-bottom:10px;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
font-size:16px;
}

input{
background:#333;
color:white;
}

button{
background:#ff5a00;
color:white;
cursor:pointer;
}

button:hover{
background:#ff7700;
}

.hidden{
display:none;
}

ul{
list-style:none;
margin-top:10px;
}

li{
background:#333;
padding:10px;
margin-top:5px;
border-radius:8px;
}

#messages{
height:180px;
overflow-y:auto;
background:#222;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.msg{
background:#333;
padding:8px;
margin-top:5px;
border-radius:8px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎭 Mafia Game</h1>
<p>შექმენი ოთახი ან შეუერთდი</p>

<input type="text" id="playerName" placeholder="შენი სახელი">

<button onclick="createRoom()">ოთახის შექმნა</button>
<button onclick="joinRoom()">ოთახში შესვლა</button>

<div id="roomBox" class="hidden">
<h2>ოთახი: <span id="roomCode"></span></h2>
<ul id="playersList"></ul>
<button onclick="startGame()">თამაშის დაწყება</button>
</div>

<div id="gameBox" class="hidden">
<h2 id="phaseText">ღამე</h2>
<p id="roleText"></p>

<div id="messages"></div>

<input type="text" id="msgInput" placeholder="დაწერე შეტყობინება">
<button onclick="sendMessage()">გაგზავნა</button>

<button onclick="nextPhase()">შემდეგი ფაზა</button>
</div>

</div>

<script>
let players = [];
let roles = [
"მაფია",
"დონი",
"ექიმი",
"შერიფი",
"მოქალაქე",
"მოქალაქე",
"მოქალაქე",
"მოქალაქე"
];

let phase = "ღამე";

function createRoom(){
let name = document.getElementById("playerName").value.trim();

if(name===""){
alert("შეიყვანე სახელი");
return;
}

players = [name];

document.getElementById("roomCode").innerText =
Math.floor(1000 + Math.random()*9000);

document.getElementById("roomBox").classList.remove("hidden");

updatePlayers();
}

function joinRoom(){
let name = document.getElementById("playerName").value.trim();

if(name===""){
alert("შეიყვანე სახელი");
return;
}

players.push(name);

document.getElementById("roomBox").classList.remove("hidden");

updatePlayers();
}

function updatePlayers(){
let list = document.getElementById("playersList");
list.innerHTML = "";

players.forEach(player=>{
let li = document.createElement("li");
li.innerText = player;
list.appendChild(li);
});
}

function startGame(){
if(players.length < 2){
alert("მინიმუმ 2 მოთამაშე საჭიროა");
return;
}

document.getElementById("gameBox").classList.remove("hidden");

let randomRole =
roles[Math.floor(Math.random()*roles.length)];

document.getElementById("roleText").innerText =
"შენი როლი: " + randomRole;
}

function nextPhase(){
phase = (phase === "ღამე") ? "დღე" : "ღამე";
document.getElementById("phaseText").innerText = phase;
}

function sendMessage(){
let input = document.getElementById("msgInput");
let text = input.value.trim();

if(text==="") return;

let msg = document.createElement("div");
msg.className = "msg";
msg.innerText = text;

document.getElementById("messages").appendChild(msg);

input.value = "";

document.getElementById("messages").scrollTop =
document.getElementById("messages").scrollHeight;
}
</script>

</body>
</html>
