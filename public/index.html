<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<title>super-mafia-game</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🎭 super-mafia-game</h1>

<div id="შესვლა">
  <input id="სახელი" placeholder="შენი სახელი">
  <input id="ოთახი" placeholder="Room ID">
  <button onclick="შესვლა()">შესვლა</button>
</div>

<div id="თამაში" class="hidden">

  <h2 id="ფაზა">ლობისი</h2>
  <h3 id="როლი"></h3>

  <button onclick="დაწყება()">თამაშის დაწყება</button>

  <div id="მოთამაშეები"></div>

  <button onclick="აირჩიე('kill')">🔫 მოკვლა</button>
  <button onclick="აირჩიე('heal')">🩺 განკურნება</button>

  <button onclick="დადასტურება()">დადასტურება</button>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="script.js"></script>

</body>
</html>
